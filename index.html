<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pledgr Profile</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0A0A0F; color: #F0EFF8; min-height: 100vh; }
    .container { max-width: 480px; margin: 0 auto; padding: 24px 16px 60px; }
    .profile-card { background: #13131A; border-radius: 20px; border: 0.5px solid rgba(255,255,255,0.07); padding: 24px; margin-bottom: 16px; }
    .avatar-row { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
    .avatar { width: 64px; height: 64px; border-radius: 50%; background: #2D2A6E; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 800; color: #A99CFF; flex-shrink: 0; border: 2px solid rgba(152,150,176,0.4); }
    .username { font-size: 22px; font-weight: 700; color: #F0EFF8; letter-spacing: -0.5px; }
    .verified-badge { display: inline-block; margin-top: 5px; padding: 2px 10px; border-radius: 999px; background: rgba(46,204,138,0.12); border: 0.5px solid rgba(46,204,138,0.3); font-size: 11px; color: #2ECC8A; font-weight: 500; }
    .level-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .level-orb { width: 42px; height: 42px; border-radius: 50%; border: 1.5px solid; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; flex-shrink: 0; }
    .level-label { font-size: 9px; color: #5C5A72; letter-spacing: 0.8px; font-weight: 500; }
    .level-name { font-size: 15px; font-weight: 600; color: #F0EFF8; margin-top: 1px; }
    .strike-badge { display: inline-block; margin-top: 4px; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; border: 0.5px solid; }
    .stats-row { display: flex; border-top: 0.5px solid rgba(255,255,255,0.06); padding-top: 14px; }
    .stat-item { flex: 1; text-align: center; }
    .stat-item + .stat-item { border-left: 0.5px solid rgba(255,255,255,0.06); }
    .stat-num { font-size: 17px; font-weight: 700; color: #F0EFF8; }
    .stat-label { font-size: 10px; color: #5C5A72; margin-top: 2px; }
    .card { background: #13131A; border-radius: 16px; border: 0.5px solid rgba(255,255,255,0.07); padding: 18px; margin-bottom: 14px; }
    .card-title { font-size: 11px; color: #5C5A72; letter-spacing: 0.8px; font-weight: 500; margin-bottom: 14px; }
    .chart-wrap { display: flex; align-items: center; gap: 20px; }
    .chart-canvas-wrap { width: 110px; height: 110px; flex-shrink: 0; }
    .chart-legend { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { font-size: 13px; color: #9896B0; flex: 1; }
    .legend-value { font-size: 14px; font-weight: 700; }
    .social-list { display: flex; flex-direction: column; gap: 8px; }
    .social-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; background: #1C1C26; border-radius: 10px; border: 0.5px solid rgba(46,204,138,0.2); text-decoration: none; color: inherit; }
    .social-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; flex-shrink: 0; }
    .social-name { font-size: 13px; font-weight: 500; color: #F0EFF8; flex: 1; }
    .social-handle { font-size: 11px; color: #2ECC8A; }
    .strike-summary { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(255,94,94,0.05); border-radius: 10px; border: 0.5px solid rgba(255,94,94,0.15); }
    .strike-summary-icon { font-size: 24px; }
    .strike-summary-info { flex: 1; }
    .strike-summary-title { font-size: 13px; font-weight: 600; color: #F0EFF8; }
    .strike-summary-sub { font-size: 11px; color: #9896B0; margin-top: 2px; }
    .ratings-list { display: flex; flex-direction: column; gap: 10px; }
    .rating-item { padding: 12px; background: #1C1C26; border-radius: 10px; }
    .rating-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
    .rating-user { font-size: 12px; color: #7C6FFF; font-weight: 500; }
    .rating-stars { font-size: 12px; color: #FFB800; }
    .rating-comment { font-size: 13px; color: #9896B0; line-height: 1.5; }
    .rating-date { font-size: 10px; color: #5C5A72; margin-top: 4px; }
    .show-more-btn { width: 100%; padding: 10px; border-radius: 10px; background: transparent; border: 0.5px solid rgba(255,255,255,0.1); color: #9896B0; font-size: 13px; cursor: pointer; margin-top: 8px; }
    .download-card { background: rgba(124,111,255,0.08); border-radius: 16px; border: 0.5px solid rgba(124,111,255,0.2); padding: 20px; text-align: center; }
    .download-title { font-size: 16px; font-weight: 700; color: #F0EFF8; margin-bottom: 6px; }
    .download-sub { font-size: 13px; color: #9896B0; margin-bottom: 16px; line-height: 1.5; }
    .download-btn { display: inline-block; background: #7C6FFF; color: #fff; font-size: 14px; font-weight: 600; padding: 12px 28px; border-radius: 999px; text-decoration: none; }
    .not-found { text-align: center; padding: 80px 20px; }
    .not-found-icon { font-size: 48px; margin-bottom: 16px; }
    .not-found-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .not-found-sub { font-size: 14px; color: #5C5A72; }
    .loading { text-align: center; padding: 80px 20px; color: #5C5A72; font-size: 14px; }
  </style>
</head>
<body>
<div class="container" id="app">
  <div class="loading">Loading profile...</div>
</div>
<script>
const SUPABASE_URL = 'https://gnahywseztaspmnfhrml.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImduYWh5d3NlenRhc3BtbmZocm1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNjU0OTUsImV4cCI6MjA5Mzc0MTQ5NX0.O4Xgu9dKnlHeIKl4iYVp-VRmX4SQnsXo2oojCLr6Lcg';

const LEVEL_INFO = {
  1: { name: 'Member', color: '#5C5A72' },
  2: { name: 'Verified', color: '#9896B0' },
  3: { name: 'Established', color: '#2ECC8A' },
  4: { name: 'Trusted', color: '#7C6FFF' },
  5: { name: 'Elite', color: '#FFB800' },
};

const SOCIAL_INFO = {
  facebook: { name: 'Facebook', color: '#4285F4', bg: 'rgba(66,133,244,0.12)', icon: 'F' },
  twitter: { name: 'X / Twitter', color: '#F0EFF8', bg: 'rgba(240,239,248,0.06)', icon: 'X' },
  discord: { name: 'Discord', color: '#5865F2', bg: 'rgba(88,101,242,0.12)', icon: 'D' },
};

const getStrikeInfo = (user) => {
  if (!user.strikes_count || user.strikes_count === 0) return null;
  switch (user.strike_severity) {
    case 'minor': return { label: `🟡 ${user.strikes_count} Warning Strike${user.strikes_count > 1 ? 's' : ''}`, color: '#FFB800', border: 'rgba(255,184,0,0.3)', bg: 'rgba(255,184,0,0.08)' };
    case 'moderate': return { label: '🟠 Restricted Trader', color: '#FF8C00', border: 'rgba(255,140,0,0.3)', bg: 'rgba(255,140,0,0.08)' };
    case 'severe': return { label: '🔴 Under Review', color: '#FF5E5E', border: 'rgba(255,94,94,0.3)', bg: 'rgba(255,94,94,0.08)' };
    case 'critical': return { label: '⛔ Suspended', color: '#FF3B30', border: 'rgba(155,0,0,0.4)', bg: 'rgba(155,0,0,0.1)' };
    default: return null;
  }
};

const getStrikeSummaryText = (user) => {
  if (!user.strikes_count || user.strikes_count === 0) return null;
  const severity = user.strike_severity;
  const count = user.strikes_count;
  const severityLabel = { minor: 'Minor', moderate: 'Moderate', severe: 'Severe', critical: 'Critical' }[severity] || severity;
  return {
    icon: { minor: '🟡', moderate: '🟠', severe: '🔴', critical: '⛔' }[severity] || '⚠️',
    title: `${count} Strike${count > 1 ? 's' : ''} on Record`,
    sub: `Highest severity: ${severityLabel}. Other traders have flagged issues with this account.`,
  };
};

async function query(table, params = '') {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${params}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  return res.json();
}

async function loadProfile() {
  const app = document.getElementById('app');
  const username = new URLSearchParams(window.location.search).get('u');

  if (!username) {
    app.innerHTML = `<div class="not-found"><div class="not-found-icon">🐶</div><div class="not-found-title">Welcome to Pledgr</div><div class="not-found-sub">A P2P transaction trust layer for safer outside trading.</div></div>`;
    return;
  }

  try {
    const users = await query('users', `?username=eq.${username}&select=*`);
    if (!users || users.length === 0) {
      app.innerHTML = `<div class="not-found"><div class="not-found-icon">🔍</div><div class="not-found-title">User not found</div><div class="not-found-sub">@${username} doesn't exist on Pledgr.</div></div>`;
      return;
    }

    const user = users[0];
    const level = LEVEL_INFO[user.trust_level] || LEVEL_INFO[1];
    const strikeInfo = getStrikeInfo(user);
    const strikeSummary = getStrikeSummaryText(user);

    const [buying, selling, socials, ratings] = await Promise.all([
      query('trades', `?buyer_id=eq.${user.id}&select=status`),
      query('trades', `?seller_id=eq.${user.id}&select=status`),
      query('social_links', `?user_id=eq.${user.id}&select=platform,handle`),
      query('ratings', `?rated_id=eq.${user.id}&select=rating,comment,created_at&order=created_at.desc`),
    ]);

    const allTrades = [...(buying || []), ...(selling || [])];
    const stats = {
      completed: allTrades.filter(t => t.status === 'completed').length,
      active: allTrades.filter(t => ['waiting','active','payment_uploaded','delivered'].includes(t.status)).length,
      expired: allTrades.filter(t => t.status === 'expired').length,
      disputed: allTrades.filter(t => t.status === 'disputed').length,
    };

    const avgRating = ratings && ratings.length > 0
      ? (ratings.reduce((s, r) => s + r.rating, 0) / ratings.length).toFixed(1)
      : null;

    document.title = `@${user.username} — Pledgr`;

    let socialsHTML = '';
    (socials || []).forEach(s => {
      const info = SOCIAL_INFO[s.platform];
      if (!info) return;
      const isUrl = s.handle.startsWith('http');
      socialsHTML += `
        <a class="social-item" href="${isUrl ? s.handle : '#'}" ${isUrl ? 'target="_blank"' : ''} style="cursor:${isUrl ? 'pointer' : 'default'}">
          <div class="social-icon" style="background:${info.bg};color:${info.color}">${info.icon}</div>
          <span class="social-name">${info.name}</span>
          <span class="social-handle">✓ Linked</span>
        </a>`;
    });

    let ratingsHTML = '';
    const initialRatings = ratings ? ratings.slice(0, 3) : [];
    initialRatings.forEach(r => {
      ratingsHTML += `
        <div class="rating-item">
          <div class="rating-header">
            <span class="rating-user">Anonymous trader</span>
            <span class="rating-stars">${'⭐'.repeat(r.rating)}</span>
          </div>
          ${r.comment ? `<div class="rating-comment">${r.comment}</div>` : ''}
          <div class="rating-date">${new Date(r.created_at).toLocaleDateString('en-PH', { month: 'short', day: 'numeric', year: 'numeric' })}</div>
        </div>`;
    });

    const hiddenRatings = ratings ? ratings.slice(3) : [];
    let hiddenHTML = '';
    hiddenRatings.forEach(r => {
      hiddenHTML += `
        <div class="rating-item" style="display:none" data-hidden>
          <div class="rating-header">
            <span class="rating-user">Anonymous trader</span>
            <span class="rating-stars">${'⭐'.repeat(r.rating)}</span>
          </div>
          ${r.comment ? `<div class="rating-comment">${r.comment}</div>` : ''}
          <div class="rating-date">${new Date(r.created_at).toLocaleDateString('en-PH', { month: 'short', day: 'numeric', year: 'numeric' })}</div>
        </div>`;
    });

    app.innerHTML = `
      <!-- Profile Card -->
      <div class="profile-card">
        <div class="avatar-row">
          <div class="avatar">${user.username[0].toUpperCase()}</div>
          <div>
            <div class="username">@${user.username}</div>
            <div class="verified-badge">✓ Pledgr Verified</div>
          </div>
        </div>

        <div class="level-row">
          <div class="level-orb" style="color:${level.color};border-color:${level.color}44;background:${level.color}22">${user.trust_level}</div>
          <div>
            <div class="level-label">TRUST LEVEL</div>
            <div class="level-name">${level.name}</div>
            ${strikeInfo ? `<div class="strike-badge" style="color:${strikeInfo.color};background:${strikeInfo.bg};border-color:${strikeInfo.border}">${strikeInfo.label}</div>` : ''}
          </div>
        </div>

        <div class="stats-row">
          <div class="stat-item">
            <div class="stat-num">${user.trade_count || 0}</div>
            <div class="stat-label">Completed</div>
          </div>
          <div class="stat-item">
            <div class="stat-num">${avgRating ? `${avgRating} ⭐` : '—'}</div>
            <div class="stat-label">Avg Rating</div>
          </div>
          <div class="stat-item">
            <div class="stat-num">${new Date(user.created_at).toLocaleDateString('en-US', { month: 'short', year: 'numeric' })}</div>
            <div class="stat-label">Member since</div>
          </div>
        </div>
      </div>

      <!-- Strike Summary (if any) -->
      ${strikeSummary ? `
      <div class="card">
        <div class="card-title">REPUTATION HISTORY</div>
        <div class="strike-summary">
          <div class="strike-summary-icon">${strikeSummary.icon}</div>
          <div class="strike-summary-info">
            <div class="strike-summary-title">${strikeSummary.title}</div>
            <div class="strike-summary-sub">${strikeSummary.sub}</div>
          </div>
        </div>
      </div>` : ''}

      <!-- Trade Breakdown -->
      ${allTrades.length > 0 ? `
      <div class="card">
        <div class="card-title">TRADE BREAKDOWN</div>
        <div class="chart-wrap">
          <div class="chart-canvas-wrap"><canvas id="donutChart"></canvas></div>
          <div class="chart-legend">
            <div class="legend-item"><div class="legend-dot" style="background:#2ECC8A"></div><span class="legend-label">Completed</span><span class="legend-value" style="color:#2ECC8A">${stats.completed}</span></div>
            <div class="legend-item"><div class="legend-dot" style="background:#7C6FFF"></div><span class="legend-label">Active</span><span class="legend-value" style="color:#7C6FFF">${stats.active}</span></div>
            <div class="legend-item"><div class="legend-dot" style="background:#FFB800"></div><span class="legend-label">Expired</span><span class="legend-value" style="color:#FFB800">${stats.expired}</span></div>
            <div class="legend-item"><div class="legend-dot" style="background:#FF5E5E"></div><span class="legend-label">Disputed</span><span class="legend-value" style="color:#FF5E5E">${stats.disputed}</span></div>
          </div>
        </div>
      </div>` : ''}

      <!-- Linked Profiles -->
      ${socialsHTML ? `
      <div class="card">
        <div class="card-title">LINKED PROFILES</div>
        <div class="social-list">${socialsHTML}</div>
      </div>` : ''}

      <!-- Ratings -->
      ${ratings && ratings.length > 0 ? `
      <div class="card">
        <div class="card-title">RATINGS & FEEDBACK</div>
        <div class="ratings-list">
          ${ratingsHTML}
          ${hiddenHTML}
        </div>
        ${hiddenRatings.length > 0 ? `<button class="show-more-btn" onclick="toggleRatings(this)">Show all ${ratings.length} ratings</button>` : ''}
      </div>` : ''}

      <!-- Download CTA -->
      <div class="download-card">
        <div class="download-title">🛡️ Trade safely with Pledgr</div>
        <div class="download-sub">Every trade has proof. Every trader has a reputation. Download Pledgr to start trading with confidence.</div>
        <a class="download-btn" href="#">Download Pledgr</a>
      </div>
    `;

    if (allTrades.length > 0) {
      const ctx = document.getElementById('donutChart').getContext('2d');
      new Chart(ctx, {
        type: 'doughnut',
        data: {
          datasets: [{
            data: [stats.completed, stats.active, stats.expired, stats.disputed],
            backgroundColor: ['#2ECC8A', '#7C6FFF', '#FFB800', '#FF5E5E'],
            borderWidth: 0,
          }]
        },
        options: { cutout: '70%', plugins: { legend: { display: false }, tooltip: { enabled: false } } }
      });
    }

  } catch (err) {
    app.innerHTML = `<div class="not-found"><div class="not-found-icon">⚠️</div><div class="not-found-title">Something went wrong</div><div class="not-found-sub">Could not load this profile.</div></div>`;
  }
}

function toggleRatings(btn) {
  const hidden = document.querySelectorAll('[data-hidden]');
  const isShowing = btn.textContent.includes('Show all');
  hidden.forEach(el => el.style.display = isShowing ? 'block' : 'none');
  btn.textContent = isShowing ? 'Show less' : `Show all ${hidden.length + 3} ratings`;
}

loadProfile();
</script>
</body>
</html>
